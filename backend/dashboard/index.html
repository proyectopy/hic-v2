<!DOCTYPE html>
<html>
<head>
    <title>HIC PRO Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        .grid {
            display: flex;
            gap: 20px;
        }

        .card {
            flex: 1;
            padding: 20px;
            border-radius: 10px;
            background: #1e293b;
        }

        canvas {
            background: #0b1220;
            border-radius: 10px;
            padding: 10px;
        }

        .ok { border: 2px solid #22c55e; }
        .warning { border: 2px solid #f59e0b; }
        .critical { border: 2px solid #ef4444; }
    </style>
</head>

<body>

<h1>🚀 HIC PRO LIVE DASHBOARD</h1>

<div class="grid">
    <div class="card">
        <h2>CPU</h2>
        <canvas id="cpuChart"></canvas>
    </div>

    <div class="card">
        <h2>RAM</h2>
        <canvas id="ramChart"></canvas>
    </div>
</div>

<h3>📜 Events</h3>
<pre id="log"></pre>

<script>
const ws = new WebSocket("ws://192.168.1.105:3005");

const labels = [];

const cpuData = [];
const ramData = [];

const cpuChart = new Chart(document.getElementById("cpuChart"), {
    type: "line",
    data: {
        labels,
        datasets: [{
            label: "CPU",
            data: cpuData,
            borderColor: "red"
        }]
    }
});

const ramChart = new Chart(document.getElementById("ramChart"), {
    type: "line",
    data: {
        labels,
        datasets: [{
            label: "RAM",
            data: ramData,
            borderColor: "cyan"
        }]
    }
});

ws.onmessage = (msg) => {
    const data = JSON.parse(msg.data);

    const cpu = data.state.cpu === "critical" ? 100 :
                data.state.cpu === "warning" ? 70 : 30;

    const ram = data.state.ram === "critical" ? 100 :
                data.state.ram === "warning" ? 70 : 30;

    const time = new Date().toLocaleTimeString();

    labels.push(time);
    cpuData.push(cpu);
    ramData.push(ram);

    if (labels.length > 20) {
        labels.shift();
        cpuData.shift();
        ramData.shift();
    }

    cpuChart.update();
    ramChart.update();

    document.getElementById("log").textContent =
        JSON.stringify(data.history.slice(-10), null, 2);
};
</script>

</body>
</html>
