<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HIC - Home Infrastructure Center</title>

    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;500;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="layout">

    <!-- ========================================================= -->
    <!-- HEADER -->
    <!-- ========================================================= -->

    <header class="header">

        <div class="brand">

            <div class="logo-hex">

                <span>HIC</span>

            </div>

            <div class="brand-info">

                <h1>Home Infrastructure Center</h1>

                <div id="breadcrumb" class="breadcrumb">

                    🏠 Inicio

                </div>

            </div>

        </div>

        <div id="status" class="status">

            <span class="status-dot"></span>

            Conectado

        </div>

    </header>

    <!-- ========================================================= -->
    <!-- SIDEBAR -->
    <!-- ========================================================= -->

    <aside class="sidebar">

        <nav>

            <ul class="menu">

                <li class="active">🏠 Inicio</li>

                <li>🖥 Infraestructura</li>

                <li>🐳 Docker</li>

                <li>💾 Almacenamiento</li>

                <li>⚙ Servicios</li>

                <li>💿 Copias de seguridad</li>

                <li>🚨 Alertas</li>

                <li>📜 Registros</li>

                <li>🔧 Configuración</li>

            </ul>

        </nav>

    </aside>

    <!-- ========================================================= -->
    <!-- CONTENIDO -->
    <!-- ========================================================= -->

    <main class="main">

        <!-- TARJETAS -->

        <section class="cards">

            <div class="card">

                <div class="card-title">

                    CPU

                </div>

                <div id="cpu" class="value">

                    --

                </div>

                <div id="cpuState" class="state">

                    --

                </div>

            </div>

            <div class="card">

                <div class="card-title">

                    RAM

                </div>

                <div id="ram" class="value">

                    --

                </div>

                <div id="ramState" class="state">

                    --

                </div>

            </div>

        </section>

        <!-- GRÁFICO -->

        <section class="card chart-card">

            <div class="section-title">

                Actividad del sistema

            </div>

            <canvas id="chart" width="900" height="250"></canvas>

        </section>

        <!-- EVENTOS -->

        <section class="card">

            <div class="section-title">

                Registro de eventos

            </div>

            <div id="events"></div>

        </section>

    </main>

</div>

<script src="/components/chart/chart.js"></script>
<script src="/js/app.js"></script>

</body>

</html>
