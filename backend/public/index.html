<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="/css/dashboard.css">
<title>HIC Datadog Pro</title>


</head>

<body>

<div class="header">
    <div>HIC Datadog Pro</div>
    <div id="status">LIVE</div>
</div>

<!-- METRICS -->
<div class="container">

    <div class="card">
        <div>CPU</div>
        <div id="cpu" class="value">--</div>
        <div id="cpuState" class="state">--</div>
    </div>

    <div class="card">
        <div>RAM</div>
        <div id="ram" class="value">--</div>
        <div id="ramState" class="state">--</div>
    </div>

</div>

<!-- GRAFICO -->
<canvas id="chart" width="900" height="250"></canvas>

<!-- EVENT STREAM -->
<div class="card" style="margin:10px;">
    <h3>EVENT STREAM</h3>
    <div id="events"></div>
</div>




<script src="/js/app.js"></script>
</body>
</html>
