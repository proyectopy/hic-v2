<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>HIC Datadog Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0f19;
    color: white;
}

.header {
    padding: 12px;
    background: #111827;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 10px;
}

.card {
    background: #111827;
    padding: 15px;
    border-radius: 10px;
}

.value {
    font-size: 36px;
    margin-top: 10px;
}

.state {
    font-size: 14px;
    opacity: 0.8;
}

.ok { color: #22c55e; }
.warning { color: #f59e0b; }
.critical { color: #ef4444; }

canvas {
    background: #0a0f1a;
    margin: 10px;
    border-radius: 10px;
}

#events {
    height: 220px;
    overflow-y: auto;
    background: #0a0f1a;
    padding: 10px;
    font-size: 12px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="header">
    <div>HIC Datadog Pro</div>
    <div id="status">LIVE</div>
</div>

<!-- METRICS -->
<div class="container">

    <div class="card">
        <div>CPU</div>
        <div id="cpu" class="value">--</div>
        <div id="cpuState" class="state">--</div>
    </div>

    <div class="card">
        <div>RAM</div>
        <div id="ram" class="value">--</div>
        <div id="ramState" class="state">--</div>
    </div>

</div>

<!-- GRAFICO -->
<canvas id="chart" width="900" height="250"></canvas>

<!-- EVENT STREAM -->
<div class="card" style="margin:10px;">
    <h3>EVENT STREAM</h3>
    <div id="events"></div>
</div>

<script>
const ws = new WebSocket(`ws://${location.host}`);

// =========================
// CHART (CPU + RAM)
// =========================
const ctx = document.getElementById("chart").getContext("2d");

function draw(series) {
    if (!series) return;

    ctx.clearRect(0, 0, 900, 250);

    function line(data, color) {
        ctx.beginPath();

        data.forEach((p, i) => {
            const x = i * 4;
            const y = 250 - p.v * 2;

            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        });

        ctx.strokeStyle = color;
        ctx.stroke();
    }

    // CPU verde
    line(series.cpu, "#22c55e");

    // RAM azul
    line(series.ram, "#60a5fa");
}

// =========================
// EVENT STREAM
// =========================
function addEvent(e) {
    const box = document.getElementById("events");

    const div = document.createElement("div");
    div.innerText = `[${e.timestamp}] ${e.metric}: ${e.from} → ${e.to}`;

    box.prepend(div);
}

// =========================
// WEBSOCKET
// =========================
ws.onmessage = (msg) => {
    const data = JSON.parse(msg.data);

    console.log("WS:", data);

    // -------------------------
    // CPU / RAM
    // -------------------------
    if (typeof data.cpu === "number") {
        document.getElementById("cpu").innerText = data.cpu + "%";
    }

    if (typeof data.ram === "number") {
        document.getElementById("ram").innerText = data.ram + "%";
    }

    // -------------------------
    // STATE (OK / WARN / CRIT)
    // -------------------------
    if (data.state) {
        document.getElementById("cpuState").innerText = data.state.cpu;
        document.getElementById("ramState").innerText = data.state.ram;

        document.getElementById("cpuState").className = "state " + data.state.cpu;
        document.getElementById("ramState").className = "state " + data.state.ram;
    }

    // -------------------------
    // GRAPH
    // -------------------------
    if (data.series) {
        draw(data.series);
    }

    // -------------------------
    // EVENTS
    // -------------------------
    if (data.events) {
        data.events.forEach(addEvent);
    }
};
</script>

</body>
</html>
